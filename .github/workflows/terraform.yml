name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  id-token: write   # OIDC token for aws-actions/configure-aws-credentials
  contents: read
  pull-requests: write  # post plan output as PR comment

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "us-east-1"
  APP_NAME: "threetier"

jobs:
  # ── Validate & Plan ──────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Select workspace
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            WORKSPACE=prod
          else
            WORKSPACE=dev
          fi
          terraform workspace select "$WORKSPACE" || terraform workspace new "$WORKSPACE"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = [
              '#### Terraform Plan `${{ steps.plan.outcome }}`',
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              `${{ steps.plan.outputs.stdout }}`,
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

  # ── Apply (main only) ────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Select prod workspace
        run: terraform workspace select prod || terraform workspace new prod

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ── Build & Deploy Container (main only, after apply) ────────────────────────
  docker-deploy:
    name: Build, Push & Deploy Container
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.APP_NAME }}-prod
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          docker build \
            --tag "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$REPOSITORY:latest" \
            ./app
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster  "${{ env.APP_NAME }}-prod-cluster" \
            --service  "${{ env.APP_NAME }}-prod-service" \
            --force-new-deployment \
            --region   "${{ env.AWS_REGION }}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.APP_NAME }}-prod-cluster" \
            --services "${{ env.APP_NAME }}-prod-service" \
            --region  "${{ env.AWS_REGION }}"
